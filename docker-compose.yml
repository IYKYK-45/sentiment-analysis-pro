services:
  sentiment-api:
    build: .
    image: sentiment-api:v1
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
